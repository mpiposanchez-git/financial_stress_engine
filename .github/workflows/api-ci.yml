name: API CI

on:
  pull_request:
    branches: [main]
    paths:
      - services/api/**
      - shared/**
      - pyproject.toml
      - .github/workflows/api-ci.yml
  push:
    branches: [main]
    paths:
      - services/api/**
      - shared/**
      - pyproject.toml
      - .github/workflows/api-ci.yml

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check services/api shared

      - name: Pytest
        run: uv run pytest services/api/tests -v
